repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^rf_protocols/
      - id: ruff-format
        files: ^rf_protocols/

  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
    rev: 1.38.1
    hooks:
      - id: basedpyright
        files: ^rf_protocols/
